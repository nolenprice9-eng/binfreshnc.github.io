<!DOCTYPE html>
<html>
<head>
  <title>Bin Fresh | Trash Can Cleaning Weddington NC</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f6;
      color: #333;
      line-height: 1.6;
    }

    /* NAVBAR */
    .nav {
      position: sticky;
      top: 0;
      background: #009624;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
    }

    /* HERO */
    header {
      background: linear-gradient(135deg, #00c853, #009624);
      color: white;
      text-align: center;
      padding: 80px 20px;
    }

    header h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
    }

    .btn-primary {
      background: white;
      color: #009624;
    }

    .btn-secondary {
      background: #333;
      color: white;
    }

    /* SECTIONS */
    section {
      max-width: 900px;
      margin: auto;
      padding: 40px 20px;
    }
